---
- name: Provision devbox
  hosts: devbox
  become: true
  gather_facts: true
  pre_tasks:
    - name: Ensure apt cache is fresh
      apt:
        update_cache: true
        cache_valid_time: 3600
      changed_when: false
  roles:
    - role: base                # apt updates, packages, fum4 user, sudoers, ssh key
      tags: [base, bootstrap]

    - role: hardening           # disable root SSH + password auth, ufw
      tags: [hardening, bootstrap]

    - role: swap                # 2G swapfile + vm.swappiness=10 (lets cgroup MemoryHigh throttle gracefully)
      tags: [swap, bootstrap]

    - role: tailscale           # install + bring up (needs $TAILSCALE_AUTHKEY)
      tags: [tailscale, bootstrap]

    - role: runtimes            # mise (it pulls Node/Bun/pnpm per-project)
      tags: [runtimes, tools]

    - role: agent-tools         # ripgrep, fd, jq, gh
      tags: [agent-tools, tools]

    - role: claude              # Claude Code CLI
      tags: [claude, tools]

    - role: zellij              # Zellij binary (disposable session-dashboard viewer)
      tags: [zellij, tools]

    - role: dtach               # detachable PTY for systemd-supervised agent sessions
      tags: [dtach, tools]

    - role: claude-squad        # Claude Squad TUI
      tags: [claude-squad, tools]

    - role: process-compose     # process-compose binary (for headless services)
      tags: [process-compose, tools]

    - role: docker              # Docker engine + Compose plugin (for local infra stacks)
      tags: [docker, tools]

    - role: playwright-deps     # apt libs for Chromium headless-shell (kost mobile-preview, future e2e)
      tags: [playwright-deps, tools]

    - role: ntfy                # ntfy CLI (dormant; no integrations yet)
      tags: [ntfy, tools]

    # Installs Ansible itself so the box can re-run site.yml against
    # localhost — see chezmoi/dot_local/bin/executable_devbox-reprov.
    - role: ansible-cli
      tags: [ansible-cli, tools]

    - role: github-identity     # install age-encrypted GitHub SSH key + PAT (see docs/github.md)
      tags: [github-identity, repos]

    - role: expo-identity       # install age-encrypted EAS token (EXPO_TOKEN) into the shell (see docs/expo.md)
      tags: [expo-identity, secrets]

    - role: repos               # clone every repo in ../repos.txt to ~/code/ (gated on gh auth)
      tags: [repos]

    # `agents` symlinks ~/.agents/ → ~/code/devbox/agents/, so the devbox
    # repo must already be checked out — must run AFTER `repos`.
    - role: agents
      tags: [agents, dotfiles]

    - role: dotfiles            # chezmoi + apply ../chezmoi
      tags: [dotfiles]
