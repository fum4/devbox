---
- name: Check swapfile state
  ansible.builtin.stat:
    path: "{{ swap_file }}"
  register: swap_stat

- name: Create swapfile ({{ swap_size }})
  ansible.builtin.command: "fallocate -l {{ swap_size }} {{ swap_file }}"
  when: not swap_stat.stat.exists
  changed_when: true

- name: Restrict swapfile permissions
  ansible.builtin.file:
    path: "{{ swap_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Format swapfile
  ansible.builtin.command: "mkswap {{ swap_file }}"
  when: not swap_stat.stat.exists
  changed_when: true

- name: Ensure swap entry in fstab
  ansible.posix.mount:
    path: none
    src: "{{ swap_file }}"
    fstype: swap
    opts: sw
    dump: "0"
    passno: "0"
    state: present

- name: Get currently active swap devices
  ansible.builtin.command: swapon --show=NAME --noheadings
  register: active_swaps
  changed_when: false

- name: Activate swap if not already active
  ansible.builtin.command: "swapon {{ swap_file }}"
  when: swap_file not in active_swaps.stdout
  changed_when: true

- name: Persist vm.swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ swap_swappiness }}"
    sysctl_file: /etc/sysctl.d/99-swap.conf
    state: present
    reload: true
