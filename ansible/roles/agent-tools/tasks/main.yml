---
- name: Install agent-facing CLI tools (used by Claude/Codex)
  apt:
    name:
      - ripgrep
      - fd-find
      - jq
    state: present

- name: Symlink fdfind -> fd (Debian quirk)
  file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
    force: true

- name: Install gh (GitHub CLI)
  block:
    - name: Add gh apt key
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
        mode: "0644"

    - name: Add gh apt repo
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        state: present
        filename: github-cli

    - name: Install gh
      apt:
        name: gh
        state: present
        update_cache: true
