---
- name: Install mise (per-user)
  shell: |
    set -e
    curl -fsSL https://mise.run | sh
  args:
    creates: "/home/{{ devbox_user }}/.local/bin/mise"
  become_user: "{{ devbox_user }}"

- name: Activate mise in bashrc
  lineinfile:
    path: "/home/{{ devbox_user }}/.bashrc"
    line: 'eval "$(/home/{{ devbox_user }}/.local/bin/mise activate bash)"'
    state: present
    create: true
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
