---
- name: Install mise (per-user)
  shell: |
    set -e
    curl -fsSL https://mise.run | sh
  args:
    creates: "/home/{{ devbox_user }}/.local/bin/mise"
  become_user: "{{ devbox_user }}"

# Note: mise activation in ~/.bashrc is owned by chezmoi (see
# chezmoi/dot_bashrc — the `if [ -x ~/.local/bin/mise ]; then ...` block).
# We don't append it here too; chezmoi's version is the source of truth.
