---
# Install the EAS access token (EXPO_TOKEN) from an age-encrypted secret so
# interactive `eas` / `bunx eas-cli` on the VPS authenticate without an
# interactive `eas login` (which doesn't survive a rebuild).
#
#   ansible/secrets/expo-token.age  →  export EXPO_TOKEN=... in ~/.bashrc.local
#
# Decrypted on the CONTROLLER (your laptop) using devbox/secrets.local (the age
# private key, gitignored). The VPS never sees the age private key. CI does NOT
# read this — GitHub Actions has its own `EXPO_TOKEN` secret, synced from the
# same token with `gh secret set` (the .age file is the canonical source).
#
# See docs/expo.md for the one-time bootstrap (create token → encrypt → sync CI).
#
# Skips gracefully when the secret OR secrets.local is missing — e.g. a
# VPS-local `devbox-reprov`, which has no age private key. A token installed by
# a prior laptop provision persists in ~/.bashrc.local across such reprovisions.

- name: Check for encrypted Expo token
  stat:
    path: "{{ playbook_dir }}/secrets/expo-token.age"
  register: expo_secret
  delegate_to: localhost
  become: false

- name: Check for the age private key on the controller
  stat:
    path: "{{ playbook_dir }}/../secrets.local"
  register: expo_age_key
  delegate_to: localhost
  become: false

- name: Notice — Expo token unavailable, skipping expo-identity
  debug:
    msg: >-
      EXPO_TOKEN not installed
      ({{ 'expo-token.age missing' if not expo_secret.stat.exists
          else 'secrets.local missing on controller' }}).
      Bootstrap on the laptop per docs/expo.md, or use `eas login` interactively.
  when: not (expo_secret.stat.exists and expo_age_key.stat.exists)

- name: Decrypt Expo token on the controller
  command: age -d -i {{ playbook_dir }}/../secrets.local {{ playbook_dir }}/secrets/expo-token.age
  register: expo_token
  delegate_to: localhost
  become: false
  no_log: true
  changed_when: false
  when: expo_secret.stat.exists and expo_age_key.stat.exists

- name: Ensure ~/.bashrc.local exists with tight perms
  file:
    path: "/home/{{ devbox_user }}/.bashrc.local"
    state: touch
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0600"
    modification_time: preserve
    access_time: preserve
  when: expo_secret.stat.exists and expo_age_key.stat.exists

- name: Install EXPO_TOKEN into the interactive shell env
  blockinfile:
    path: "/home/{{ devbox_user }}/.bashrc.local"
    marker: "# {mark} EXPO_TOKEN (managed by devbox/expo-identity role)"
    block: |
      export EXPO_TOKEN="{{ expo_token.stdout }}"
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0600"
  no_log: true
  when: expo_secret.stat.exists and expo_age_key.stat.exists
