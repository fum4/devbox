---
# Clone every repo in ../../../repos.txt to ~/code/<basename> on the VPS.
# Gated on `gh auth status` since clones use SSH/HTTPS auth that gh sets up.
#
# To re-run after `gh auth login`:
#   ansible-playbook -i inventory.ini site.yml --tags repos

- name: Check that gh is authenticated (clones depend on it)
  command: gh auth status
  register: gh_auth_check
  failed_when: false
  changed_when: false
  become_user: "{{ devbox_user }}"

- name: Notice — gh not authenticated, skipping repo clones
  debug:
    msg: |
      `gh auth status` reports not authenticated; skipping repos role.
      To finish:
        1. ssh devbox
        2. gh auth login           (use SSH protocol — see clone-repo skill)
        3. ansible-playbook -i inventory.ini site.yml --tags repos
  when: gh_auth_check.rc != 0

- name: Ensure ~/code exists
  file:
    path: "/home/{{ devbox_user }}/code"
    state: directory
    owner: "{{ devbox_user }}"
    group: "{{ devbox_user }}"
    mode: "0755"
  when: gh_auth_check.rc == 0

- name: Read repos.txt
  slurp:
    src: "{{ playbook_dir }}/../repos.txt"
  register: repos_raw
  delegate_to: localhost
  become: false
  when: gh_auth_check.rc == 0

- name: Parse repos list
  set_fact:
    repos_list: >-
      {{ (repos_raw.content | b64decode).splitlines()
         | map('trim')
         | reject('match', '^#')
         | reject('match', '^$')
         | list }}
  when: gh_auth_check.rc == 0

- name: Clone repos to ~/code/<basename>
  git:
    repo: >-
      {{ item if (':' in item or '://' in item) else 'git@github.com:' + item + '.git' }}
    dest: >-
      /home/{{ devbox_user }}/code/{{ (item | basename) | regex_replace('\.git$', '') }}
    update: false        # don't auto-pull on re-run; sync happens via `wt`
    accept_hostkey: true
  loop: "{{ repos_list | default([]) }}"
  become_user: "{{ devbox_user }}"
  when: gh_auth_check.rc == 0
  register: clone_result
  failed_when: false   # don't abort the playbook if one repo fails (private, archived, etc.)

- name: Report any clone failures
  debug:
    msg: "Failed to clone: {{ item.item }} — {{ item.msg | default('check gh auth + repo access') }}"
  loop: "{{ clone_result.results | default([]) }}"
  when:
    - gh_auth_check.rc == 0
    - item.failed | default(false)
  loop_control:
    label: "{{ item.item }}"

# --- per-repo first-run install -------------------------------------------
# After each clone, run:
#   1. `mise trust .` so mise will load the repo's .mise.toml
#   2. `mise install` to fetch the repo's locked tool versions
#   3. `mise run setup` so the repo's own install task runs (convention)
#
# Each step uses `failed_when: false` because:
#   - some cloned repos may have no .mise.toml at all
#   - even when they do, `setup` is an opt-in convention; not every repo will
#     define it. Mise returns non-zero for missing tasks; we tolerate that.

- name: Compute repo dir names (basename minus .git)
  set_fact:
    repo_dirs: "{{ repos_list | default([]) | map('basename') | map('regex_replace', '\\.git$', '') | list }}"
  when: gh_auth_check.rc == 0

- name: Trust each repo's .mise.toml
  command: mise trust .
  args:
    chdir: "/home/{{ devbox_user }}/code/{{ item }}"
  loop: "{{ repo_dirs | default([]) }}"
  become_user: "{{ devbox_user }}"
  changed_when: false
  failed_when: false
  when: gh_auth_check.rc == 0

- name: Install each repo's locked tool versions (mise install)
  command: mise install
  args:
    chdir: "/home/{{ devbox_user }}/code/{{ item }}"
  loop: "{{ repo_dirs | default([]) }}"
  become_user: "{{ devbox_user }}"
  register: mise_install_result
  failed_when: false
  when: gh_auth_check.rc == 0

- name: Run each repo's `setup` task if defined
  command: mise run setup
  args:
    chdir: "/home/{{ devbox_user }}/code/{{ item }}"
  loop: "{{ repo_dirs | default([]) }}"
  become_user: "{{ devbox_user }}"
  register: setup_result
  failed_when: false
  when: gh_auth_check.rc == 0

- name: Report repos whose `setup` task failed (excluding 'task not defined')
  debug:
    msg: "{{ item.item }}: mise run setup → rc={{ item.rc }}, stderr: {{ (item.stderr | default('')) | truncate(200) }}"
  loop: "{{ setup_result.results | default([]) }}"
  when:
    - gh_auth_check.rc == 0
    - item.rc | default(0) != 0
    - "'no tasks' not in (item.stderr | default('')) | lower"
    - "'task ' not in (item.stderr | default('')) | lower or 'not found' not in (item.stderr | default('')) | lower"
  loop_control:
    label: "{{ item.item }}"
