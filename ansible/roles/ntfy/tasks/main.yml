---
# ntfy CLI — installed via the latest .deb from GitHub releases.
# (archive.heckel.io's apt repo started returning 404 around 2026-05; the
# GitHub releases are the maintained distribution path.)
# Installed dormant; no topics, subscriptions, or systemd services wired up.
# To use: pick a random topic, `curl -d "msg" ntfy.sh/<topic>`, subscribe on phone.

# `check_mode: false` makes the GET run even under --check (safe + idempotent),
# so the next task has `ntfy_release.json` populated.
- name: Resolve latest ntfy release tag
  ansible.builtin.uri:
    url: https://api.github.com/repos/binwiederhier/ntfy/releases/latest
    return_content: true
  register: ntfy_release
  changed_when: false
  check_mode: false

- name: Install ntfy .deb
  apt:
    deb: "https://github.com/binwiederhier/ntfy/releases/download/{{ ntfy_release.json.tag_name }}/ntfy_{{ ntfy_release.json.tag_name | regex_replace('^v', '') }}_linux_amd64.deb"
    state: present
