# Inventory for self-reprovisioning: ansible runs locally on the devbox,
# targeting localhost as if it were the `devbox` host. Used by the
# `devbox-reprov` wrapper script — see chezmoi/dot_local/bin/executable_devbox-reprov.
#
# Unlike `inventory.ini` (laptop → VPS over SSH), this one needs no
# `ansible_host`/`ansible_user`/SSH key — `ansible_connection=local` and
# `become: true` (from site.yml) + NOPASSWD sudo for `fum4` is enough.

[devbox]
localhost ansible_connection=local

[devbox:vars]
ansible_user=fum4
