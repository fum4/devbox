name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Ansible + yamllint
        # Full `ansible` (not `ansible-core`) so the bundled collections the roles
        # use — community.general (ufw), ansible.posix (sysctl/mount) — resolve in
        # syntax-check. This mirrors the box, which installs full `ansible` via apt
        # (see ansible/roles/ansible-cli). ansible-core has no collections, so it
        # red the check on every push.
        run: pip install ansible yamllint

      - name: yamllint
        # Config lives in ./.yamllint at the repo root.
        run: yamllint .

      - name: ansible-playbook --syntax-check
        # Use the example inventory so the syntax check has a host group to
        # bind `hosts: devbox` against. No real connection happens.
        run: ansible-playbook --syntax-check -i ansible/inventory.ini.example ansible/site.yml

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          shellcheck \
            bin/doctor \
            bin/devbox-tf \
            chezmoi/dot_bashrc \
            chezmoi/dot_local/bin/executable_*

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          # Keep in step with the mise pin in .mise.toml [tools].
          terraform_version: '1.15.6'

      - name: terraform fmt -check
        run: terraform -chdir=terraform/devbox fmt -check -recursive

      - name: terraform validate
        # -backend=false: no R2 creds in CI — validation only needs providers,
        # resolved from the committed .terraform.lock.hcl.
        run: |
          terraform -chdir=terraform/devbox init -backend=false -input=false
          terraform -chdir=terraform/devbox validate
