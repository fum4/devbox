name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ansible + yamllint
        run: |
          pip install ansible-core yamllint

      - name: yamllint
        run: yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: {check-keys: false}}}' ansible/ .github/

      - name: ansible-playbook --syntax-check
        # Use the example inventory so the syntax check has a real host group
        # to bind `hosts: devbox` against. No real connection happens.
        run: ansible-playbook --syntax-check -i ansible/inventory.ini.example ansible/site.yml

      - name: shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck \
            bin/doctor \
            chezmoi/dot_bashrc \
            chezmoi/dot_local/bin/executable_*
